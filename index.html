<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT USING HTML AND CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <fieldset>
        <legend>
    <form>
        <div>
            <h3>Registration</h3>
            <br>
            <h4>Personal Details</h4>
            <br>
            <label>
                Full name
            </label>
            <input type="text" name="full name" maxlength="30" length="40" placeholder="Enter your name">
            <label>
                Date of Birth
            </label>
            <input type="text" name="Date of Birth" maxlength="30" length="40" placeholder="Enter birth date">
            <label>
                Email
            </label>
            <input type="text" name="Email" maxlength="30" length="40" placeholder="Enter your email">
            <br><br><br><br>
            <label>
                Mobile number
            </label>
            <input type="text" name="Mobile number" maxlength="30" length="40" placeholder="Enter mobile number">
            <label>
                Gender
            </label>
            <input type="text" name="Gender" maxlength="30" length="40" placeholder="Enter your gender">
            <label>
                Occuption
            </label>
            <input type="text" name="Occuption" maxlength="30" length="40" placeholder="Enter occuption">
            <br><br><br><br>
            <h4>Identity Details</h4>
            <br>
            <label>
                ID 
            </label>
            <input type="text" name="ID Type" maxlength="30" length="40" placeholder="Enter ID type">
            <label>
                ID Number
            </label>
            <input type="text" name="ID Number" maxlength="30" length="40" placeholder="Enter ID number">
            <label>
                Issue Authority
            </label>
            <input type="text" name="Issue Authority" maxlength="30" length="40" placeholder="Enter issue department">
            <br><br><br><br>
            <label>
                Issue Date
            </label>
            <input type="text" name="Isue Date" maxlength="30" length="40" placeholder="Enter ID issue date">
            <label>
                Issue State
            </label>
            <input type="text" name="Issue State" maxlength="30" length="40" placeholder="Enter ID issue state">
            <label>
                Expiry Date
            </label>
            <input type="text" name="Expiry Date" maxlength="30" length="40" placeholder="Enter ID expiry date">
            <br><br><br><br>
            <a href="Next.html" target="blank">
            <button type="button" target="blank" width="25%" height="25%">Next &rarr;</button>
            </a>    
        </div>
    </form>
</legend>
</fieldset>
</body>
</html>
